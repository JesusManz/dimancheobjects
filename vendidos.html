<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
    <meta name="description" content="La tiendita de los objetos con estilo. Nuevos objetos vintage y de diseño para tu casa cada domingo.">
<meta name="robots" content="index, follow">
  <meta property="og:title" content="DIMANCHE — Vendidos">
  <meta property="og:image" content="/favicon.png">
  <meta property="og:description" content="Objetos vendidos por Dimanche Objects">
  <meta property="og:url" content="https://dimancheobjects.com/vendidos">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/styleshop.css">
  <link rel="stylesheet" href="styles/vendidos.css">
  <link rel="stylesheet" href="styles/cart.css">
  <link rel="stylesheet" href="styles/newsletter.css">
  <link rel="preload" href="data/productos-vendidos.json" as="fetch" crossorigin>
  <title>Vendidos en Dimanche Objects</title>
  <style>

.newsletter-titulo, .newsletter-texto {
  display: none;
} 

  </style>
</head>
<body>

  <!-- HEADER -->
  <div id="header"></div>

  <!-- CONTENIDO -->
  <div class="container">

 
    <div class="header-text">
      <h2>OBJETOS VENDIDOS</h2>
         <p class="vendidos-contador" id="vendidos-contador" onclick="mostrarContador()" style="cursor:pointer;">
  Haz click aquí para mostrar el número de objetos vendidos.
</p>

    </div>
    <hr color="red" size="2px" align="center" />
            <!-- NEWSLETTER -->
  <div id="newsletter"></div>

    <div id="productos" class="columns"></div>

  </div>
  <!-- CARRITO -->
  <div id="cart"></div>

    <!-- POPUP  -->
<div id="popup-mount"></div>

  <!-- FOOTER -->
  <div id="footer"></div>

  <script src="scripts/components.js"></script>
<script src="scripts/cart.js"></script>
<script>
  const DATA_PATH_VENDIDOS = '/data/productos-vendidos.json';
  let todosLosVendidos = [];
  let totalVendidos    = 0;
  let contadorRevelado = false;
  let paginaActual     = 0;
  const POR_PAGINA     = 20;
  let cargando         = false;

  function renderVendidos(lista) {
    const container = document.getElementById('productos');
    if (!container) return;
    container.innerHTML = lista.map(p => `
      <div class="column"
           data-categorias="${p.categorias.join(' ')}"
           data-precio="${p.precio}">
        <img class="column-picturev"
             src="assets/compressed/${p.imagen.split('/').pop()}"
             alt="${p.nombre}"
             loading="lazy">
        <p>${p.nombre}</p>
      </div>
    `).join('');
  }

  function añadirVendidos(lista) {
    const container = document.getElementById('productos');
    if (!container) return;
    container.insertAdjacentHTML('beforeend', lista.map(p => `
      <div class="column"
           data-categorias="${p.categorias.join(' ')}"
           data-precio="${p.precio}">
        <img class="column-picturev"
             src="assets/compressed/${p.imagen.split('/').pop()}"
             alt="${p.nombre}"
             loading="lazy">
        <p>${p.nombre}</p>
      </div>
    `).join(''));
  }

  function cargarPagina() {
    if (cargando) return;
    const inicio = paginaActual * POR_PAGINA;
    const fin    = inicio + POR_PAGINA;
    const pagina = todosLosVendidos.slice(inicio, fin);
    if (pagina.length === 0) return;

    cargando = true;
    if (paginaActual === 0) {
      renderVendidos(pagina);
    } else {
      añadirVendidos(pagina);
    }
    paginaActual++;
    cargando = false;
  }

  function mostrarContador() {
    if (!contadorRevelado) {
      document.getElementById('vendidos-contador').textContent =
        `Actualmente hemos vendido ${totalVendidos} objetos.`;
      contadorRevelado = true;
    }
  }

  window.addEventListener('scroll', () => {
    const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
    if (scrollTop + clientHeight >= scrollHeight - 300) {
      cargarPagina();
    }
  });

  document.addEventListener('components:ready', async () => {
    const res        = await fetch(DATA_PATH_VENDIDOS);
    todosLosVendidos = await res.json();
    totalVendidos    = todosLosVendidos.length;
    cargarPagina();
  });
</script>

</body>
</html>
