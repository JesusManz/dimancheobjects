<!-- Diseño y desarrollo @jmanzbb -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta property="og:title" content="DIMANCHE">
  <meta property="og:image" content="/favicon.png">
  <meta property="og:description" content="DIMANCHE OBJECTS">
  <meta property="og:url" content="https://dimancheobjects.com/gracias">
  <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/styleshop.css">
  <link rel="stylesheet" href="styles/cart.css">
  <link rel="stylesheet" href="styles/newsletter.css">
  <link rel="sitemap" type="application/xml" href="/sitemap.xml">
  <title>Gracias por tu compra - Dimanche Objects</title>
  <style>
    .gracias-container {
      display:         flex;
      flex-direction:  column;
      align-items:     center;
      justify-content: center;
      
      text-align:      center;
      padding:         60px 32px 120px;
      gap:             20px;
    }

    .gracias-titulo {
      font-family: 'ArialNarrow';
      font-size:             20px;
      font-weight:           800;
      transform: scaleY(1.6);
      text-transform:        uppercase;
      color:                 red;
   
    }

    .gracias-texto {
      font-size:   15px;
      font-weight: 600;
      line-height: 20px;
      color:       #282828;
      max-width:   420px;
    }

    .gracias-link {
      font-size:       15px;
      font-weight:     700;
    
      color:           #282828;
      text-decoration: none;
      padding-bottom:  2px;
    }

    .gracias-link:hover {
      color:        #010eff;
      border-color: #010eff;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div id="header"></div>

  <!-- CONTENIDO -->
  <div class="gracias-container">
    <p class="gracias-titulo">¡Muchas gracias por tu compra!</p>
    <p class="gracias-texto">
      Hemos recibido tu pedido. Lo vamos a empaquetar con mucho cariño y enseguida te lo enviamos.<br><br>Te enviaremos un email cuando lo hayamos enviado, con el código de seguimiento.
    </p>
    <a class="gracias-link" href="https://www.instagram.com/dimancheobjects">¿Ya nos sigues en IG?</a>
  </div>

  <!-- CARRITO -->
  <div id="cart"></div>

  <!-- FOOTER -->
  <div id="footer"></div>

  <script src="scripts/components.js"></script>
  <script src="scripts/cart.js"></script>
  <script>
    // Limpiar carrito tras compra exitosa
    localStorage.removeItem('carrito');
  </script>

</body>
</html>
