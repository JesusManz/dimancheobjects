<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta property="og:title" content="DIMANCHE">
  <meta property="og:image" content="/favicon.png">
  <meta property="og:description" content="DIMANCHE OBJECTS">
  <meta property="og:url" content="https://dimancheobjects.com">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/product.css">
  <link rel="stylesheet" href="styles/cart.css">
  <link rel="stylesheet" href="styles/newsletter.css">
  <title>Dimanche Objects</title>
    <style>
    .newsletter-titulo-vendidos,
    .newsletter-texto-vendidos {
      display: none;
    }
  </style>
</head>
<body>

  <!-- HEADER SEMICIRCULOS -->
  <div id="semicircle"></div>

  <!-- LAYOUT PRODUCTO -->
  <div class="producto-layout">

    <!-- COLUMNA IZQUIERDA: info fija -->
    <div class="producto-info">
      <h2 id="producto-nombre"></h2>
      <div id="producto-descripcion" class="producto-descripcion"></div>
      <div id="producto-precio" class="producto-precio"></div>
<div id="talla-selector"></div>
<button id="btn-añadir" class="btn-añadir" onclick="handleAñadirMerch()">AÑADIR AL CARRITO</button>
      <p id="producto-envio-info" class="producto-envio-info"></p>
    </div>

    <!-- COLUMNA DERECHA: imágenes + relacionados -->
    <div class="producto-imagenes-col">
      <div id="producto-imagenes" class="producto-imagenes"></div>

      <div id="relacionados-section" class="relacionados-section" style="display:none;">
        <p class="relacionados-titulo">MÁS PRODUCTOS CON ESTILO</p>
        <div id="relacionados" class="relacionados-grid"></div>
      </div>

              <!-- NEWSLETTER -->
  <div id="newsletter"></div>
    </div>

  </div>

  <!-- CARRITO -->
  <div id="cart"></div>

      <!-- POPUP  -->
<div id="popup-mount"></div>

  <!-- FOOTER -->
  <div id="footer"></div>

  <script src="scripts/components.js"></script>
  <script src="scripts/cart.js"></script>
  <script src="scripts/merch-product.js"></script>

</body>
</html>
